CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_I2C=y

# Battery-safe default (Seeed wiki): UART off so the unpowered USB-UART bridge
# is not back-fed via TX when running from the battery pads. Use prj_uart.conf
# (PROFILE=uart ./build.sh) for USB serial monitor debugging.
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_LOG_BACKEND_RTT=y

CONFIG_STD_C99=y

CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_NEWLIB_LIBC=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

CONFIG_HWINFO=y

CONFIG_SENSOR=y
CONFIG_TEMP_NRF5=y

# Battery voltage measurement via SAADC (channels defined in the board DTS,
# selected at runtime by the configured battery_sense_pin).
CONFIG_ADC=y
CONFIG_ADC_NRFX_SAADC=y

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
# Vendor-specific HCI commands: needed for runtime TX-power control via
# HCI VS Write_Tx_Power_Level (opendisplay_ble.c apply_tx_power).
CONFIG_BT_HCI_VS=y
CONFIG_BT_DEVICE_NAME="OpenDisplay"
# Note: "Send auto LE param update failed (err -128)" ~5s after a short-lived
# connection is harmless (client already gone). Keep the auto-update at its
# default so the BT host behavior matches the known-good configuration.
CONFIG_BT_L2CAP_TX_MTU=512
CONFIG_BT_BUF_ACL_RX_SIZE=512
CONFIG_BT_BUF_ACL_TX_SIZE=512
# Pipe commands are queued to the main thread, but keep headroom on the BT RX
# thread for GATT/ATT plus our enqueue path.
CONFIG_BT_RX_STACK_SIZE=8192
# Config read notifies up to 10 chunks back-to-back from the BT RX thread; the
# default 3 buffers/contexts cannot refill mid-loop (their completion is handled
# on the same thread), so provision enough to hold the whole burst without
# blocking. All three pools independently cap in-flight notifications.
CONFIG_BT_L2CAP_TX_BUF_COUNT=12
CONFIG_BT_ATT_TX_COUNT=12
CONFIG_BT_CONN_TX_MAX=12

CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_PSA_CRYPTO_C=y
CONFIG_ENTROPY_GENERATOR=y
CONFIG_ENTROPY_DEVICE_RANDOM_GENERATOR=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_PSA_WANT_ALG_CMAC=y
CONFIG_PSA_WANT_ALG_ECB_NO_PADDING=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
