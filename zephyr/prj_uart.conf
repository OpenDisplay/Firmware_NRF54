# USB bench debugging overlay (Seeed wiki: prj_uart.conf).
# Apply via: PROFILE=uart ./build.sh
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# Route printk/printf to USB UART only (not RTT).
CONFIG_USE_SEGGER_RTT=n
CONFIG_RTT_CONSOLE=n
# CONFIG_LOG_BACKEND_RTT is not set
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
