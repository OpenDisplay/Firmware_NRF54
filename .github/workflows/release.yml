name: Release Firmware

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build & Upload Firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache NCS SDK
        id: cache-ncs
        uses: actions/cache@v4
        with:
          path: |
            ~/ncs/v3.3.1
            ~/ncs/toolchains
          key: ncs-v3.3.1-${{ runner.os }}

      - name: Install NCS SDK and toolchain
        if: steps.cache-ncs.outputs.cache-hit != 'true'
        run: |
          pip install --upgrade pip nrfutil
          nrfutil install sdk-manager
          nrfutil sdk-manager install --ncs-version v3.3.1

      - name: Build nRF54L15 Firmware
        working-directory: Firmware_NRF54
        env:
          BUILD_VERSION: ${{ github.event.release.tag_name }}
          SHA: ${{ github.sha }}
        run: ./build.sh

      - name: Package hex
        run: |
          mkdir -p firmware_output
          cp Firmware_NRF54/build/merged.hex \
            "firmware_output/nrf54l15-${{ github.event.release.tag_name }}.hex"

      - name: Upload Release Assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: firmware_output/*
          tag: ${{ github.ref }}
          file_glob: true
          overwrite: true
