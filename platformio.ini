; OpenDisplay firmware for Seeed XIAO nRF54L15 and nRF54LM20A (Zephyr + bb_epaper)

[env]
extra_scripts =
  pre:scripts/factory_config_gen.py
  post:scripts/post_upload_reset.py
; xPack OpenOCD (cmsis-dap) predates nRF54L RRAM and corrupts the image on write.
; pyocd (builtin nrf54l target) and probe-rs both program RRAM correctly.
upload_protocol = pyocd
monitor_speed = 115200
build_flags =
  -DTARGET_NRF54
  -DOD_APP_VERSION=0x0100
  -DOPENDISPLAY_BUILD_ID=\"nrf54\"
  -DOPENDISPLAY_ZLIB_USE_HEAP_WINDOW=0
  -D__ARM_FEATURE_DSP=1

[env:seeed-xiao-nrf54l15]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
framework = zephyr
board = seeed-xiao-nrf54l15
build_flags =
  ${env.build_flags}
  -DNRF54_BOARD_L15

[env:seeed-xiao-nrf54lm20a]
platform = https://github.com/Seeed-Studio/platform-seeedboards.git
framework = zephyr
board = seeed-xiao-nrf54lm20a
build_flags =
  ${env.build_flags}
  -DNRF54_BOARD_LM20
